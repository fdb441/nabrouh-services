<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الخدمات الإلكترونية - رئاسة مركز ومدينة نبروه</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      padding: 0;
    }

    .header-banner {
      background: linear-gradient(135deg, #0b294d 0%, #153b66 100%);
      color: white;
      text-align: center;
      padding: 50px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border-bottom: 4px solid #d4af37;
    }

    .header-banner h1 { margin: 0; font-size: 32px; }
    .header-banner p { margin: 10px 0 0 0; font-size: 18px; opacity: 0.9; }

    .menu-container {
      max-width: 800px;
      margin: 50px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* تصميم أزرار الخدمات الكبيرة */
    .service-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      padding: 20px 30px;
      border-radius: 15px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      border: 1px solid #eef2f5;
      transition: all 0.3s ease;
    }

    .service-btn:hover {
      transform: scale(1.02);
      border-color: #0b294d;
      box-shadow: 0 6px 20px rgba(11, 41, 77, 0.1);
    }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn-icon {
      font-size: 28px;
      background: #f0f4f8;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .btn-title {
      font-size: 20px;
      font-weight: 700;
      color: #0b294d;
    }

    .btn-arrow {
      font-size: 20px;
      color: #0b294d;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header-banner">
    <h1>بوابة الخدمات الإلكترونية</h1>
    <p>رئاسة مركز ومدينة نبروه</p>
  </div>

  <div class="menu-container">
    <a href="tasaleh.html" class="service-btn">
      <div class="btn-content">
        <div class="btn-icon">📝</div>
        <div class="btn-title">طلب التصالح في مخالفات البناء</div>
      </div>
      <div class="btn-arrow">←</div>
    </a>

    <a href="taqneen.html" class="service-btn">
      <div class="btn-content">
        <div class="btn-icon">📜</div>
        <div class="btn-title">طلب تقنين أوضاع أملاك الدولة</div>
      </div>
      <div class="btn-arrow">←</div>
    </a>

    <a href="shops.html" class="service-btn">
      <div class="btn-content">
        <div class="btn-icon">🏬</div>
        <div class="btn-title">ترخيص المحال العامة والتجارية</div>
      </div>
      <div class="btn-arrow">←</div>
    </a>

    <a href="meters.html" class="service-btn">
      <div class="btn-content">
        <div class="btn-icon">⚡</div>
        <div class="btn-title">تركيب العدادات الكودية للمرافق</div>
      </div>
      <div class="btn-arrow">←</div>
    </a>
  </div>

</body>
</html>
